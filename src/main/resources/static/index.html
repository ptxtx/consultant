<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能志愿填报顾问</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 85vh;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #2f54eb;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: normal;
        }
        .new-chat-btn {
            background-color: #52c41a;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: normal;
        }
        .new-chat-btn:hover {
            background-color: #389e0d;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message.user {
            margin-left: auto;
            align-items: flex-end;
        }
        .message.ai {
            margin-right: auto;
            align-items: flex-start;
        }
        .message-content {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .user .message-content {
            background-color: #2f54eb;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .ai .message-content {
            background-color: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            background-color: white;
        }
        .chat-input {
            flex: 1;
            height: 42px;
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus {
            border-color: #2f54eb;
        }
        .send-btn {
            margin-left: 12px;
            padding: 0 22px;
            background-color: #2f54eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .send-btn:hover {
            background-color: #1d39c4;
        }
        .send-btn:disabled {
            background-color: #bfbfbf;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title">
            <span>传智志愿填报 AI 顾问</span>
            <span id="sessionBadge" class="status-badge">会话ID: 加载中...</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn">+ 新建会话</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">
            <div class="message-content">你好！我是传智教育智能志愿填报咨询师。请问有什么我可以帮您的？</div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="输入高考志愿相关问题，按回车发送..." autocomplete="off">
        <button id="sendBtn" class="send-btn">发送</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const sessionBadge = document.getElementById('sessionBadge');

    // 核心改造：引入客户端 sessionId 机制
    let sessionId = '';

    // 初始化或获取当前会话ID
    function initSession(forceNew = false) {
        if (forceNew) {
            // 新增会话：生成全新UUID并存入本地
            sessionId = crypto.randomUUID();
            localStorage.setItem('CHAT_SESSION_ID', sessionId);

            // 清空前端聊天看板，保留一条欢迎语
            chatMessages.innerHTML = `
                <div class="message ai">
                    <div class="message-content">新会话已开启！请输入您的问题。</div>
                </div>
            `;
        } else {
            // 读取现有会话，若不存在则新建
            sessionId = localStorage.getItem('CHAT_SESSION_ID');
            if (!sessionId) {
                sessionId = crypto.randomUUID();
                localStorage.setItem('CHAT_SESSION_ID', sessionId);
            }
        }
        // 更新顶部的 Session 编号显示（取前8位缩略显示）
        sessionBadge.textContent = `会话ID: ${sessionId.substring(0, 8)}`;
    }

    // 滚动置底
    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 渲染消息DOM
    function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = text;

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        scrollToBottom();
        return contentDiv;
    }

    // 发送流式消息
    async function sendMessage() {
        const messageText = chatInput.value.trim();
        if (!messageText) return;

        chatInput.value = '';
        chatInput.disabled = true;
        sendBtn.disabled = true;

        appendMessage('user', messageText);
        const aiContentElement = appendMessage('ai', '正在思考...');

        try {
            // 发送请求时同时携带 msg 和唯一的 sessionId 传给后端
            const url = `/chat?msg=${encodeURIComponent(messageText)}&memoryId=${encodeURIComponent(sessionId)}`;
            const response = await fetch(url, { method: 'GET' });

            if (!response.ok) throw new Error('网络异常');

            aiContentElement.textContent = '';
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                aiContentElement.textContent += chunk;
                scrollToBottom();
            }

        } catch (error) {
            console.error(error);
            aiContentElement.textContent = '❌ 服务器开小差了，请稍后再试。';
            aiContentElement.style.color = 'red';
        } finally {
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    // 事件监听绑定
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // 点击“新建会话”触发隔离逻辑
    newChatBtn.addEventListener('click', () => {
        if (confirm('确定要结束当前讨论，开启一个全新的独立会话吗？')) {
            initSession(true);
        }
    });

    // 页面初次加载初始化
    initSession();
</script>

</body>
</html>
