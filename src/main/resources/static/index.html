<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能顾问</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #2f54eb;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            margin-left: auto;
            align-items: flex-end;
        }
        .message.ai {
            margin-right: auto;
            align-items: flex-start;
        }
        .message-content {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .user .message-content {
            background-color: #2f54eb;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .ai .message-content {
            background-color: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            background-color: white;
        }
        .chat-input {
            flex: 1;
            height: 40px;
            padding: 8px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus {
            border-color: #2f54eb;
        }
        .send-btn {
            margin-left: 12px;
            padding: 0 20px;
            background-color: #2f54eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .send-btn:hover {
            background-color: #1d39c4;
        }
        .send-btn:disabled {
            background-color: #bfbfbf;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">AI 智能顾问 (DeepSeek)</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">
            <div class="message-content">你好！我是你的AI顾问，有什么我可以帮你的吗？</div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="输入您的问题，按回车发送..." autocomplete="off">
        <button id="sendBtn" class="send-btn">发送</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    // 自动滚动到最底部
    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 创建消息DOM
    function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = text;

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        scrollToBottom();
        return contentDiv; // 返回内容区的引用以便后续追加流式文本
    }

    // 发送消息核心逻辑（处理流式Flux返回）
    async function sendMessage() {
        const messageText = chatInput.value.trim();
        if (!messageText) return;

        // 1. 禁用输入与按钮
        chatInput.value = '';
        chatInput.disabled = true;
        sendBtn.disabled = true;

        // 2. 渲染用户消息
        appendMessage('user', messageText);

        // 3. 创建AI响应占位消息
        const aiContentElement = appendMessage('ai', '正在思考...');

        try {
            // 4. 发起Fetch请求调用后端的 /chat 接口
            // 你的后端通过请求参数接收 msg: chat(String msg)
            const response = await fetch(`/chat?msg=${encodeURIComponent(messageText)}`, {
                method: 'GET'
            });

            if (!response.ok) {
                throw new Error('网络请求错误');
            }

            // 清空"正在思考..."提示，准备接收真正的流式文本
            aiContentElement.textContent = '';

            // 5. 读取流式数据 (ReadableStream)
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                // 解码当前数据块并追加到AI文本框内
                const chunk = decoder.decode(value, { stream: true });
                aiContentElement.textContent += chunk;
                scrollToBottom();
            }

        } catch (error) {
            console.error('Error:', error);
            aiContentElement.textContent = '❌ 出错啦，请稍后再试。';
            aiContentElement.style.color = 'red';
        } finally {
            // 6. 恢复输入状态
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
